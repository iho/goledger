openapi: 3.0.3
info:
  title: GoLedger API
  description: Double-entry ledger system with account management, transfers, and holds
  version: 1.0.0
  contact:
    name: API Support
    email: support@goledger.io
  license:
    name: MIT

servers:
  - url: http://localhost:8080/api/v1
    description: Development server
  - url: https://api.goledger.io/v1
    description: Production server

tags:
  - name: Authentication
    description: User authentication and session management
  - name: Accounts
    description: Account management operations
  - name: Transfers
    description: Transfer operations between accounts
  - name: Entries
    description: Ledger entries (the append-only debit/credit rows behind every transfer)
  - name: Holds
    description: Hold management (reserve funds)
  - name: Ledger
    description: Ledger-wide consistency checks
  - name: Audit
    description: Admin-only audit trail reads for examiners
  - name: Health
    description: System health and readiness checks

paths:
  # Authentication
  /auth/login:
    post:
      tags: [Authentication]
      summary: User login
      description: Authenticate user and return JWT token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: admin@goledger.io
                password:
                  type: string
                  format: password
                  example: Password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT authentication token
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: '#/components/schemas/UserInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Authentication]
      summary: Get current user
      description: Returns current authenticated user information
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Accounts
  /accounts:
    post:
      tags: [Accounts]
      summary: Create account
      description: Create a new ledger account
      operationId: createAccount
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    get:
      tags: [Accounts]
      summary: List accounts
      description: List all accounts with pagination
      operationId: listAccounts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /accounts/{id}:
    get:
      tags: [Accounts]
      summary: Get account
      description: Get account by ID
      operationId: getAccount
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          $ref: '#/components/responses/NotFound'

  /accounts/{id}/entries:
    get:
      tags: [Entries]
      summary: List entries for an account
      operationId: listEntriesByAccount
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/Entry'

  /accounts/{id}/transfers:
    get:
      tags: [Transfers]
      summary: List transfers for an account
      description: >
        Pass `cursor` (the ID of the last transfer from the previous page) for
        keyset pagination - stable under concurrent writes, and the
        recommended approach. Omit `cursor` entirely to fall back to legacy
        `offset` pagination.
      operationId: listTransfersByAccount
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: cursor
          in: query
          description: ID of the last transfer seen; triggers keyset pagination when present (even if empty, to start from the most recent transfer).
          schema:
            type: string
      responses:
        '200':
          description: List of transfers (cursor-paginated shape shown; offset mode returns a bare array)
          content:
            application/json:
              schema:
                type: object
                properties:
                  transfers:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transfer'
                  next_cursor:
                    type: string
                    description: Pass as `cursor` to fetch the next page; absent/empty on the last page.

  /accounts/{id}/balance/history:
    get:
      tags: [Accounts]
      summary: Historical balance
      description: Balance of the account as of a point in time.
      operationId: getHistoricalBalance
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: at
          in: query
          required: true
          description: RFC3339 timestamp
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Balance at the given time
          content:
            application/json:
              schema:
                type: object
                properties:
                  account_id:
                    type: string
                  at:
                    type: string
                    format: date-time
                  balance:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  # Transfers
  /transfers:
    post:
      tags: [Transfers]
      summary: Create transfer
      description: Create a new transfer between accounts
      operationId: createTransfer
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransferRequest'
      responses:
        '201':
          description: Transfer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '412':
          description: Precondition failed (insufficient funds, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /transfers/batch:
    post:
      tags: [Transfers]
      summary: Batch transfer
      description: Create multiple transfers atomically in a single transaction.
      operationId: createBatchTransfer
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transfers]
              properties:
                event_at:
                  type: string
                  format: date-time
                metadata:
                  type: object
                  additionalProperties: true
                transfers:
                  type: array
                  items:
                    $ref: '#/components/schemas/CreateTransferRequest'
      responses:
        '201':
          description: Transfers created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transfer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '412':
          description: Precondition failed (insufficient funds, currency mismatch, etc.) - none of the batch is applied

  /transfers/{id}:
    get:
      tags: [Transfers]
      summary: Get transfer
      description: Get transfer by ID
      operationId: getTransfer
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transfer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '404':
          $ref: '#/components/responses/NotFound'

  /transfers/{id}/entries:
    get:
      tags: [Entries]
      summary: List entries for a transfer
      description: The debit and credit entries that make up a transfer (always exactly two, in opposite accounts).
      operationId: listEntriesByTransfer
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/Entry'

  /transfers/{id}/reverse:
    post:
      tags: [Transfers]
      summary: Reverse transfer
      description: Create a reversal transfer
      operationId: reverseTransfer
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '201':
          description: Reversal transfer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '412':
          description: Transfer already reversed or cannot be reversed

  # Holds
  /holds:
    post:
      tags: [Holds]
      summary: Create hold
      description: Place a hold on account funds
      operationId: createHold
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHoldRequest'
      responses:
        '201':
          description: Hold created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Hold'
        '412':
          description: Insufficient funds

  /holds/{id}/void:
    post:
      tags: [Holds]
      summary: Void hold
      description: Cancel a hold and release funds
      operationId: voidHold
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Hold voided successfully
        '412':
          description: Hold is not active or has expired

  /holds/{id}/capture:
    post:
      tags: [Holds]
      summary: Capture hold
      description: Capture a hold as a transfer
      operationId: captureHold
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_account_id]
              properties:
                to_account_id:
                  type: string
      responses:
        '201':
          description: Hold captured as transfer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '412':
          description: Hold is not active or has expired

  # Ledger
  /ledger/consistency:
    get:
      tags: [Ledger]
      summary: Check ledger-wide consistency
      description: On-demand version of the check the background reconciliation scheduler runs on RECONCILIATION_INTERVAL.
      operationId: checkLedgerConsistency
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Ledger is consistent
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: consistent
                  consistent:
                    type: boolean
        '409':
          description: Ledger is inconsistent
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: inconsistent
                  consistent:
                    type: boolean
                  message:
                    type: string

  # Audit
  /audit:
    get:
      tags: [Audit]
      summary: List audit logs
      description: Admin-only. Every mutating action (and login attempts) is recorded here, hash-chained for tamper evidence.
      operationId: listAuditLogs
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: resource_type
          in: query
          schema:
            type: string
        - name: resource_id
          in: query
          schema:
            type: string
        - name: start_date
          in: query
          description: RFC3339 timestamp
          schema:
            type: string
            format: date-time
        - name: end_date
          in: query
          description: RFC3339 timestamp
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of audit logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'
        '403':
          $ref: '#/components/responses/Forbidden'

  /audit/export:
    get:
      tags: [Audit]
      summary: Export audit logs as CSV
      description: Admin-only. Same filters as GET /audit.
      operationId: exportAuditLogs
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: resource_type
          in: query
          schema:
            type: string
        - name: resource_id
          in: query
          schema:
            type: string
        - name: start_date
          in: query
          schema:
            type: string
            format: date-time
        - name: end_date
          in: query
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: CSV export
          content:
            text/csv:
              schema:
                type: string
        '403':
          $ref: '#/components/responses/Forbidden'

  /audit/resource/{type}/{id}:
    get:
      tags: [Audit]
      summary: Audit trail for one resource
      description: Admin-only. e.g. every audited action taken on a single transfer.
      operationId: getAuditLogsByResource
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
          example: transfer
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of audit logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'
        '403':
          $ref: '#/components/responses/Forbidden'

  /audit/user/{userId}:
    get:
      tags: [Audit]
      summary: Audit trail for one user
      description: Admin-only. Every audited action a single user has taken.
      operationId: getAuditLogsByUser
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of audit logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'
        '403':
          $ref: '#/components/responses/Forbidden'

  # Health - these three are NOT under /api/v1 on the real router (see
  # internal/adapter/http/router.go), hence the servers override on each.
  /health:
    servers:
      - url: http://localhost:8080
        description: Development server (root, not /api/v1)
    get:
      tags: [Health]
      summary: Liveness check
      description: Check if the process is up. Does not check downstream dependencies.
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy

  /ready:
    servers:
      - url: http://localhost:8080
        description: Development server (root, not /api/v1)
    get:
      tags: [Health]
      summary: Readiness check
      description: Checks Postgres and Redis connectivity in addition to liveness.
      operationId: readinessCheck
      responses:
        '200':
          description: Service is ready to accept traffic
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
        '503':
          description: A dependency (Postgres/Redis) is unavailable

  /metrics:
    servers:
      - url: http://localhost:8080
        description: Development server (root, not /api/v1)
    get:
      tags: [Health]
      summary: Prometheus metrics
      description: Prometheus text exposition format.
      operationId: metrics
      responses:
        '200':
          description: Metrics in Prometheus text format
          content:
            text/plain:
              schema:
                type: string

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login

  parameters:
    Limit:
      name: limit
      in: query
      description: Maximum number of results (max 1000)
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 50
    Offset:
      name: offset
      in: query
      description: Number of results to skip
      schema:
        type: integer
        minimum: 0
        default: 0

  schemas:
    UserInfo:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, operator, viewer]

    Account:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
        balance:
          type: string
          description: Current balance (decimal string)
        encumbered_balance:
          type: string
          description: Amount held (decimal string)
        allow_negative_balance:
          type: boolean
        allow_positive_balance:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateAccountRequest:
      type: object
      required: [name, currency]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          example: USD
        allow_negative_balance:
          type: boolean
          default: false
        allow_positive_balance:
          type: boolean
          default: false
          description: >
            Both allow_* flags default to false: a newly created account
            can neither go negative nor positive until you explicitly opt
            in, so it can only ever hold a zero balance. Set the flag(s)
            matching how the account will be used (e.g. allow_positive_balance
            for a normal wallet that receives funds).

    Transfer:
      type: object
      properties:
        id:
          type: string
        from_account_id:
          type: string
        to_account_id:
          type: string
        amount:
          type: string
          description: Transfer amount (decimal string)
        created_at:
          type: string
          format: date-time
        event_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
        reversed_transfer_id:
          type: string
          nullable: true

    CreateTransferRequest:
      type: object
      required: [from_account_id, to_account_id, amount]
      properties:
        from_account_id:
          type: string
        to_account_id:
          type: string
        amount:
          type: string
          pattern: '^\d+(\.\d+)?$'
          example: "100.00"
        metadata:
          type: object
          additionalProperties: true

    Hold:
      type: object
      properties:
        id:
          type: string
        account_id:
          type: string
        amount:
          type: string
        status:
          type: string
          enum: [active, voided, captured]
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Reserved for future use; not currently set by any code path.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateHoldRequest:
      type: object
      required: [account_id, amount]
      properties:
        account_id:
          type: string
        amount:
          type: string
          pattern: '^\d+(\.\d+)?$'

    Entry:
      type: object
      description: One side (debit or credit) of a double-entry transfer. Append-only at the database level.
      properties:
        id:
          type: string
        account_id:
          type: string
        transfer_id:
          type: string
        amount:
          type: string
          description: Signed decimal string - negative for the debit side, positive for the credit side.
        account_previous_balance:
          type: string
        account_current_balance:
          type: string
        account_version:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time

    AuditLog:
      type: object
      description: Append-only, hash-chained (see `./bin/cli audit verify-chain`) audit trail row.
      properties:
        id:
          type: string
        user_id:
          type: string
        action:
          type: string
          example: transfer.create
        resource_type:
          type: string
        resource_id:
          type: string
        ip_address:
          type: string
        user_agent:
          type: string
        request_id:
          type: string
        status:
          type: string
          enum: [success, failure, error]
        error_message:
          type: string
        before_state:
          type: object
          additionalProperties: true
        after_state:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        prev_hash:
          type: string
          description: SHA-256 hex of the previous row in the chain.
        hash:
          type: string
          description: SHA-256 hex of this row's content.
        chain_seq:
          type: integer
          format: int64
          description: Authoritative chain ordering, assigned at insert time.

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
